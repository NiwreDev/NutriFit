services:

  mysql:
    image: mysql:8.4

    container_name: nutrifit_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nutrifit

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend/api

    container_name: nutrifit_backend

    depends_on:
      - mysql

    ports:
      - "8080:8080"

volumes:
  mysql_data: